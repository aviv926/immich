name: Sync Immich Release & Build Images

on:
  schedule:
    - cron: '0 * * * *'    # every hour
  workflow_dispatch:

permissions:
  contents: write       # to update your branch
  packages: write       # to push images to GHCR
  actions: read

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.get_latest.outputs.tag }}
    steps:
      - name: Fetch latest Immich release tag
        id: get_latest
        uses: actions/github-script@v6
        with:
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: 'immich-app',
              repo:  'immich'
            });
            return release.data.tag_name;
          result-encoding: string

      - name: Check out this repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream & fetch tags
        run: |
          git remote add upstream https://github.com/immich-app/immich.git
          git fetch upstream --tags

      - name: Force-update `dockerimageML` → latest tag
        run: |
          git branch -f dockerimageML ${{ steps.get_latest.outputs.tag }}
          git push origin dockerimageML --force

  build-server:
    needs: sync
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.sync.outputs.release_tag }}
      GHCR_REPO: ghcr.io/${{ github.repository_owner }}
    steps:
      - name: Check out code _at_ the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}
          fetch-depth: 0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GHCR_REPO }}/immich-server:${{ env.IMAGE_TAG }}

  build-ml:
    needs: sync
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - device: cpu
            suffix: ""
          - device: cuda
            suffix: "-cuda"
    env:
      IMAGE_TAG: ${{ needs.sync.outputs.release_tag }}
      GHCR_REPO: ghcr.io/${{ github.repository_owner }}
    steps:
      - name: Check out code _at_ the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}
          fetch-depth: 0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build & push ML image (${{
          matrix.device
        }})
        uses: docker/build-push-action@v6
        with:
          context: machine-learning
          file: machine-learning/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            DEVICE=${{ matrix.device }}
          tags: |
            ${{ env.GHCR_REPO }}/immich-machine-learning:${{ env.IMAGE_TAG }}${{ matrix.suffix }}
