name: Sync Immich Upstream Release and Build Images

on:
  schedule:
    # Adjust cron schedule as needed. This runs every 6 hours.
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force sync and build for the latest upstream release, even if previously processed.'
        type: boolean
        default: false
      specific_tag:
        description: '(Optional) Specific immich-app/immich tag to sync and build (e.g., v1.100.0). Overrides latest.'
        required: false
        type: string

# Permissions for GITHUB_TOKEN used by other steps (API calls, GHCR push)
permissions:
  contents: read    # Default for checkout by GITHUB_TOKEN. Push to self-repo will need 'write' at job level.
  packages: write   # For GITHUB_TOKEN to push Docker images to GHCR
  actions: read     # For GITHUB_TOKEN to make API calls (e.g., in determine_tag)

jobs:
  sync_and_build:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.determine_tag.outputs.tag_to_process }}
      should_run_build: ${{ steps.check_if_new.outputs.should_run_build }}
    permissions: # Permissions specifically for this job using GITHUB_TOKEN
      contents: write   # <<<<<<< NEEDED for GITHUB_TOKEN to push to its own repo
      packages: write   # (If this job also pushes packages, otherwise can be at workflow level)
      actions: read     # (If this job also makes API calls, otherwise can be at workflow level)
      # workflows: write # <<<<<<< NOT NEEDED with the new strategy

    steps:
      # ... (Harden Runner, Determine Upstream Tag, Cache steps, Check if new, Save Cache) ...

      - name: Checkout upstream immich-app/immich release code
        if: steps.check_if_new.outputs.should_run_build == 'true'
        uses: actions/checkout@v4
        with:
          repository: immich-app/immich
          ref: ${{ steps.determine_tag.outputs.tag_to_process }}
          path: upstream_source # Checks out to $GITHUB_WORKSPACE/upstream_source

      # REMOVE the old "Configure Git for pushing" and "Push code" steps.
      # REPLACE them with the new comprehensive sync and push step:

      - name: Sync to Target Branch (Excluding Upstream .github/workflows)
        if: steps.check_if_new.outputs.should_run_build == 'true'
        env:
          TARGET_BRANCH: dockerimageML
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Using GITHUB_TOKEN for the push
          UPSTREAM_TAG: ${{ steps.determine_tag.outputs.tag_to_process }}
          UPSTREAM_SOURCE_PATH: ${{ github.workspace }}/upstream_source # Absolute path to upstream checkout
        run: |
          set -e # Exit immediately if a command exits with a non-zero status.

          MY_REPO_URL="https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git"
          TARGET_WORKDIR_NAME="target_repo_for_sync"
          TARGET_WORKDIR_PATH="${{ github.workspace }}/$TARGET_WORKDIR_NAME" # Absolute path for the target repo clone

          echo "Preparing target directory $TARGET_WORKDIR_PATH for branch $TARGET_BRANCH"
          rm -rf "$TARGET_WORKDIR_PATH" # Clean up from any previous run

          # Clone the target branch from your repository, or initialize it if it doesn't exist
          if git ls-remote --exit-code --heads "$MY_REPO_URL" "refs/heads/$TARGET_BRANCH"; then
            echo "Cloning existing branch $TARGET_BRANCH from $MY_REPO_URL..."
            git clone --depth 1 --branch "$TARGET_BRANCH" "$MY_REPO_URL" "$TARGET_WORKDIR_PATH"
          else
            echo "Branch $TARGET_BRANCH not found in $MY_REPO_URL. Initializing it locally."
            mkdir -p "$TARGET_WORKDIR_PATH"
            cd "$TARGET_WORKDIR_PATH"
            git init
            git checkout -b "$TARGET_BRANCH" # Create the branch
            # An initial commit might be needed if the branch is truly new and sync results in no files
            cd "${{ github.workspace }}" # Return to GITHUB_WORKSPACE
          fi
          
          cd "$TARGET_WORKDIR_PATH" # Navigate into the cloned/initialized target directory
          git config user.name "GitHub Actions Bot (Immich Sync)"
          git config user.email "actions-bot@users.noreply.github.com"

          # Preserve the current .github/workflows directory from the target branch (if it exists)
          TEMP_WORKFLOWS_BACKUP_DIR=$(mktemp -d) # Create a unique temporary directory for the backup
          TARGET_BRANCH_DOT_GITHUB_WORKFLOWS_PATH=".github/workflows" # Relative path within $TARGET_WORKDIR_PATH

          if [ -d "$TARGET_BRANCH_DOT_GITHUB_WORKFLOWS_PATH" ]; then
            echo "Preserving existing '$TARGET_BRANCH_DOT_GITHUB_WORKFLOWS_PATH' from branch '$TARGET_BRANCH'..."
            # Move the 'workflows' directory itself into the temp backup dir
            mv "$TARGET_BRANCH_DOT_GITHUB_WORKFLOWS_PATH" "$TEMP_WORKFLOWS_BACKUP_DIR/workflows"
            echo "Preserved to $TEMP_WORKFLOWS_BACKUP_DIR/workflows"
          else
            echo "No '$TARGET_BRANCH_DOT_GITHUB_WORKFLOWS_PATH' found in branch '$TARGET_BRANCH' to preserve."
          fi
          
          # Use rsync to copy from upstream_source to the current directory (TARGET_WORKDIR_PATH)
          # Source path: $UPSTREAM_SOURCE_PATH/ (trailing slash means copy contents)
          # Destination: . (current directory, i.e., $TARGET_WORKDIR_PATH)
          # --delete: remove files in destination that are not in source
          # --exclude '.git/': don't copy .git from source (upstream_source is a checkout, so it has one)
          # --exclude '.github/workflows/': don't copy this specific directory from source
          echo "Syncing content from $UPSTREAM_SOURCE_PATH (tag $UPSTREAM_TAG), excluding its .github/workflows/ ..."
          rsync -a --delete \
                --exclude '.git/' \
                --exclude '.github/workflows/' \
                "$UPSTREAM_SOURCE_PATH/" . # Target is current dir ($TARGET_WORKDIR_PATH)

          # Restore the preserved .github/workflows (if any)
          if [ -d "$TEMP_WORKFLOWS_BACKUP_DIR/workflows" ]; then
            echo "Restoring preserved .github/workflows..."
            # Ensure .github directory exists before moving workflows into it (rsync might have deleted .github if it was empty upstream)
            mkdir -p ".github"
            mv "$TEMP_WORKFLOWS_BACKUP_DIR/workflows" ".github/workflows"
            echo "Restored to .github/workflows"
          fi
          rm -rf "$TEMP_WORKFLOWS_BACKUP_DIR" # Clean up the temporary backup directory

          # Add, commit, and push changes
          echo "Staging changes..."
          git add -A .

          if git diff --staged --quiet; then
            echo "No effective content changes to commit after syncing with upstream $UPSTREAM_TAG (workflows handled)."
            # If the branch was newly created locally and is still empty after sync,
            # we might need an initial commit to establish it on the remote.
            if ! git ls-remote --exit-code --heads "$MY_REPO_URL" "refs/heads/$TARGET_BRANCH"; then
              if git rev-parse --verify --quiet "refs/heads/$TARGET_BRANCH"; then # Check if local branch exists
                echo "Branch $TARGET_BRANCH is new on remote. Pushing current state."
                # If HEAD has no commits (e.g. new branch, sync resulted in no files) make an empty one.
                if ! git rev-parse --verify --quiet HEAD^{commit} 2>/dev/null; then
                    git commit --allow-empty -m "Establish $TARGET_BRANCH (synced from $UPSTREAM_TAG, workflows excluded)"
                fi
                git push "$MY_REPO_URL" HEAD:"refs/heads/$TARGET_BRANCH" --force
                echo "Pushed new branch $TARGET_BRANCH to remote."
              fi
            else
              echo "Branch $TARGET_BRANCH already exists on remote, and no new content changes to push."
            fi
          else
            echo "Committing changes..."
            COMMIT_MSG="Sync from immich-app/immich@$UPSTREAM_TAG, preserving target's .github/workflows

Upstream tag: $UPSTREAM_TAG
Workflow sync strategy: Target branch .github/workflows preserved. Upstream .github/workflows ignored during sync."
            git commit -m "$COMMIT_MSG"
            
            echo "Pushing with force to $TARGET_BRANCH..."
            git push "$MY_REPO_URL" HEAD:"refs/heads/$TARGET_BRANCH" --force
            echo "Push to $TARGET_BRANCH complete."
          fi
          
          cd "${{ github.workspace }}" # IMPORTANT: Go back to original GITHUB_WORKSPACE

          
  # --- Docker Build Jobs ---
  # These jobs will run only if the sync_and_build job determined it should run.
  # They will checkout the freshly updated dockerimageML branch from aviv926/immich.

build-server:
    needs: sync_and_build
    if: needs.sync_and_build.outputs.should_run_build == 'true'
    runs-on: ubuntu-latest
    permissions: # These permissions are for GITHUB_TOKEN
      contents: read    # To checkout code from aviv926/immich
      packages: write   # To push to GHCR using GITHUB_TOKEN
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@17d0e2bd7d51742c71671bd19fa12bdc9d40a3d6 # v2.8.1
        with:
          egress-policy: audit

      - name: Checkout aviv926/immich@dockerimageML
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }} # This repository (aviv926/immich)
          ref: dockerimageML        # The branch we just pushed to
          # token: ${{ secrets.GITHUB_TOKEN }} # Default, uses GITHUB_TOKEN with 'contents: read'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }} # Use GITHUB_TOKEN for GHCR

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/immich-server:${{ needs.sync_and_build.outputs.release_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ml:
    needs: sync_and_build
    if: needs.sync_and_build.outputs.should_run_build == 'true'
    runs-on: ubuntu-latest
    permissions: # These permissions are for GITHUB_TOKEN
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - device: cpu
            suffix: ""
            dockerfile: machine-learning/Dockerfile
          - device: cuda
            suffix: "-cuda"
            dockerfile: machine-learning/Dockerfile
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@17d0e2bd7d51742c71671bd19fa12bdc9d40a3d6 # v2.8.1
        with:
          egress-policy: audit

      - name: Checkout aviv926/immich@dockerimageML
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: dockerimageML
          # token: ${{ secrets.GITHUB_TOKEN }} # Default

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ML image (${{ matrix.device }})
        uses: docker/build-push-action@v6
        with:
          context: machine-learning
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          build-args: |
            DEVICE=${{ matrix.device }}
          tags: ghcr.io/${{ github.repository_owner }}/immich-machine-learning:${{ needs.sync_and_build.outputs.release_tag }}${{ matrix.suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
